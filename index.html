<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Graphix Educ - L'Étude de Fonction Gratuite</title>
    <script src="https://unpkg.com/function-plot/dist/function-plot.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/mathjs/12.4.0/math.all.js"></script>
    <style>
        :root { --primary: #2563eb; --secondary: #059669; --bg: #f8fafc; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); margin: 0; padding: 15px; }
        .container { max-width: 1100px; margin: auto; background: white; padding: 25px; border-radius: 20px; box-shadow: 0 10px 40px rgba(0,0,0,0.08); }
        
        .header { text-align: center; margin-bottom: 25px; }
        .badge { background: #dcfce7; color: #166534; padding: 5px 12px; border-radius: 20px; font-size: 0.8rem; font-weight: bold; }

        .grid { display: grid; grid-template-columns: 1fr 380px; gap: 25px; }
        @media (max-width: 950px) { .grid { grid-template-columns: 1fr; } }

        #plot { width: 100%; height: 500px; border: 1px solid #e2e8f0; border-radius: 15px; background: white; }

        /* Panneau d'étude détaillée */
        .analysis-panel {
            background: #ffffff; border: 1px solid #e2e8f0; border-radius: 15px; padding: 20px;
            margin-top: 25px; box-shadow: inset 0 2px 4px rgba(0,0,0,0.02);
        }
        .analysis-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(250px, 1fr)); gap: 20px; margin-top: 15px; }
        .card { background: #f1f5f9; padding: 15px; border-radius: 10px; border-top: 4px solid var(--primary); }
        .card h4 { margin: 0 0 10px 0; color: #334155; font-size: 0.9rem; text-transform: uppercase; }

        /* Clavier */
        .keyboard { display: grid; grid-template-columns: repeat(4, 1fr); gap: 8px; }
        .key { padding: 12px; background: white; border: 1px solid #cbd5e1; border-radius: 8px; cursor: pointer; font-weight: bold; transition: 0.2s; }
        .key:hover { background: #f1f5f9; border-color: var(--primary); }
        .key.action { background: var(--primary); color: white; border: none; grid-column: span 4; padding: 18px; font-size: 1rem; }

        .variation-table { width: 100%; border-collapse: collapse; margin-top: 10px; font-size: 0.9rem; }
        .variation-table td { border: 1px solid #cbd5e1; padding: 8px; text-align: center; }
        .arrow { font-size: 1.2rem; font-weight: bold; }
    </style>
</head>
<body>

<div class="container">
    <div class="header">
        <h1 style="margin:0; color:#1e293b;">Graphix <span style="color:var(--primary)">Educ</span></h1>
        <span class="badge">OFFRE DE LANCEMENT : Étude 100% Gratuite</span>
    </div>

    <div class="grid">
        <div class="main">
            <input type="text" id="equation" style="width:100%; padding:18px; font-size:1.4rem; border-radius:12px; border:2px solid #e2e8f0; margin-bottom:15px; font-family:monospace;" value="x^2 - 2x - 3">
            <div id="plot"></div>
        </div>

        <div class="sidebar">
            <div class="keyboard">
                <div class="key" onclick="insert('ln(')">ln</div>
                <div class="key" onclick="insert('exp(')">exp</div>
                <div class="key" onclick="insert('sqrt(')">√</div>
                <div class="key" onclick="insert('^')">xʸ</div>
                <div class="key" onclick="insert('sin(')">sin</div>
                <div class="key" onclick="insert('cos(')">cos</div>
                <div class="key" onclick="insert('PI')">π</div>
                <div class="key" onclick="insert('E')">e</div>
                <div class="key" onclick="insert('7')">7</div>
                <div class="key" onclick="insert('8')">8</div>
                <div class="key" onclick="insert('9')">9</div>
                <div class="key" onclick="insert('/')">÷</div>
                <div class="key" onclick="insert('4')">4</div>
                <div class="key" onclick="insert('5')">5</div>
                <div class="key" onclick="insert('6')">6</div>
                <div class="key" onclick="insert('*')">×</div>
                <div class="key" onclick="insert('1')">1</div>
                <div class="key" onclick="insert('2')">2</div>
                <div class="key" onclick="insert('3')">3</div>
                <div class="key" onclick="insert('-')">-</div>
                <div class="key" onclick="insert('0')">0</div>
                <div class="key" onclick="insert('.')">.</div>
                <div class="key" onclick="insert('x')">x</div>
                <div class="key" onclick="insert('+')">+</div>
                <div class="key" onclick="insert('(')">(</div>
                <div class="key" onclick="insert(')')">)</div>
                <div class="key" style="grid-column: span 2; color:#dc2626" onclick="clearInput()">Effacer</div>
                <button class="key action" onclick="process()">Générer l'Étude Complète</button>
            </div>
        </div>
    </div>

    <div class="analysis-panel" id="analysis-box">
        <h2 style="margin-top:0; color:#1e293b; border-bottom: 2px solid #f1f5f9; padding-bottom: 10px;">📉 Rapport d'Analyse Mathématique</h2>
        <div class="analysis-grid" id="results">
            </div>
    </div>
</div>

<script>
    const input = document.getElementById('equation');

    function insert(v) {
        const start = input.selectionStart;
        input.value = input.value.substring(0, start) + v + input.value.substring(input.selectionEnd);
        input.focus();
        input.setSelectionRange(start + v.length, start + v.length);
    }

    function clearInput() { input.value = ""; }

    function process() {
        const expr = input.value;
        draw(expr);
        analyze(expr);
    }

    function draw(expr) {
        try {
            functionPlot({
                target: "#plot",
                width: document.getElementById('plot').offsetWidth,
                height: 500,
                grid: true,
                data: [
                    { fn: expr, color: 'rgba(37, 99, 235, 0.3)', graphType: 'polyline' },
                    { fn: expr, color: '#2563eb', graphType: 'scatter', nSamples: 60 }
                ]
            });
        } catch(e) { alert("Erreur de tracé."); }
    }

    function analyze(expr) {
        const results = document.getElementById('results');
        try {
            // 1. Dérivée
            const df = math.derivative(expr, 'x').toString();
            
            // 2. Domaine (Analyse textuelle simplifiée)
            let dom = "D = ℝ";
            if(expr.includes('/')) dom = "D = ℝ \\ {valeurs interdites}";
            if(expr.includes('ln')) dom = "D = ]0 ; +∞[ (à ajuster selon l'argument)";

            // 3. Calcul de points clés
            const f0 = math.evaluate(expr, {x: 0});

            results.innerHTML = `
                <div class="card">
                    <h4>📍 Domaine de Définition</h4>
                    <p style="font-size:1.1rem; font-weight:bold;">${dom}</p>
                </div>
                <div class="card">
                    <h4>⚡ Fonction Dérivée</h4>
                    <p style="font-family:monospace; font-size:1.1rem; color:var(--primary)">f'(x) = ${df}</p>
                </div>
                <div class="card">
                    <h4>📊 Sens de Variation</h4>
                    <p>Basé sur le signe de <b>${df}</b>.</p>
                    <table class="variation-table">
                        <tr><td>x</td><td>-∞</td><td>Point Crit.</td><td>+∞</td></tr>
                        <tr><td>f'(x)</td><td>...</td><td>0</td><td>...</td></tr>
                        <tr><td>f(x)</td><td class="arrow">↘</td><td>min/max</td><td class="arrow">↗</td></tr>
                    </table>
                </div>
                <div class="card">
                    <h4>🎯 Points Remarquables</h4>
                    <p>• Intersection Axe Y : <b>(0 ; ${f0})</b></p>
                    <p>• Étude des limites : Vérifier aux bornes de ${dom}.</p>
                </div>
            `;
        } catch(err) {
            results.innerHTML = "<p style='color:red'>Erreur d'analyse. Vérifiez l'écriture de la fonction.</p>";
        }
    }

    window.onload = process;
</script>

</body>
</html>
